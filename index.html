<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Tạo Mã 2FA (TOTP)</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 400px; 
            margin: 50px auto; 
            padding: 20px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        input { 
            flex-grow: 1;
            padding: 10px; 
            box-sizing: border-box; 
            font-family: monospace;
            font-size: 16px;
        }
        button.copy-btn {
            padding: 10px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button.copy-btn:hover { background-color: #5a6268; }
        #result { 
            font-size: 48px; 
            font-weight: bold; 
            text-align: center; 
            margin-top: 20px; 
            color: #007bff; 
            letter-spacing: 5px;
            cursor: pointer; /* Đổi con trỏ thành hình bàn tay để báo hiệu có thể click */
            transition: color 0.2s;
            user-select: none;
        }
        #result:hover {
            opacity: 0.8;
        }
        .copy-hint {
            font-size: 12px;
            color: #888;
            text-align: center;
            margin-top: -5px;
            margin-bottom: 20px;
        }
        .timer-container {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #555;
        }
        .progress-bar {
            width: 100%;
            background-color: #e9ecef;
            height: 10px;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #28a745;
            width: 100%;
            transition: width 1s linear, background-color 0.3s;
        }
        .progress-fill.warning {
            background-color: #dc3545;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsSHA/3.2.0/sha.js"></script>
</head>
<body>

    <h2>Tạo Mã 2FA</h2>
    
    <label for="secret">Secret Key (Base32):</label>
    <div class="input-group">
        <input type="text" id="secret" placeholder="Ví dụ: JBSWY3DPEHPK3PXP" oninput="generateTOTP()" autocomplete="off">
        <button class="copy-btn" onclick="copySecret()" title="Copy Secret Key">Copy</button>
    </div>
    
    <div id="result" onclick="copyOTP()" title="Bấm để copy mã 6 số">------</div>
    <div class="copy-hint">(Bấm vào mã để sao chép)</div>

    <div class="timer-container">
        Mã sẽ làm mới sau: <strong id="countdown">30</strong> giây
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
    </div>

    <script>
        let currentOTP = ""; // Biến lưu mã 6 số liền nhau để copy

        // Hàm giải mã Base32 sang Hex
        function base32tohex(base32) {
            const base32chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            let bits = "";
            let hex = "";
            for (let i = 0; i < base32.length; i++) {
                const val = base32chars.indexOf(base32.charAt(i).toUpperCase());
                if (val === -1) continue;
                bits += val.toString(2).padStart(5, '0');
            }
            for (let i = 0; i + 4 <= bits.length; i += 4) {
                const chunk = bits.substr(i, 4);
                hex = hex + parseInt(chunk, 2).toString(16);
            }
            return hex;
        }

        // Hàm tạo mã TOTP
        function generateTOTP() {
            let secret = document.getElementById('secret').value.replace(/\s+/g, '');
            const resultDiv = document.getElementById('result');

            if (!secret) {
                resultDiv.innerText = "------";
                currentOTP = "";
                return;
            }

            try {
                const key = base32tohex(secret);
                const epoch = Math.round(new Date().getTime() / 1000.0);
                const time = Math.floor(epoch / 30).toString(16).padStart(16, '0');

                const shaObj = new jsSHA("SHA-1", "HEX");
                shaObj.setHMACKey(key, "HEX");
                shaObj.update(time);
                const hmac = shaObj.getHMAC("HEX");

                const offset = parseInt(hmac.substring(hmac.length - 1), 16);
                let otp = (parseInt(hmac.substr(offset * 2, 8), 16) & 0x7fffffff) + "";
                otp = otp.substr(otp.length - 6, 6).padStart(6, '0');

                currentOTP = otp; // Lưu lại mã gốc (không có dấu cách) để copy
                
                // Nếu không đang trong trạng thái hiện chữ "Đã sao chép!" thì mới cập nhật số
                if (resultDiv.innerText !== "Copied!") {
                    resultDiv.innerText = otp.substring(0, 3) + " " + otp.substring(3, 6);
                    resultDiv.style.color = "#007bff";
                    resultDiv.style.fontSize = "48px";
                }
            } catch (err) {
                resultDiv.innerText = "Lỗi!";
                currentOTP = "";
            }
        }

        // Hàm sao chép mã 2FA (TOTP)
        function copyOTP() {
            if (!currentOTP) return;
            
            navigator.clipboard.writeText(currentOTP).then(() => {
                const resultDiv = document.getElementById('result');
                resultDiv.innerText = "Copied!";
                resultDiv.style.color = "#28a745"; // Đổi màu xanh lá
                resultDiv.style.fontSize = "36px"; // Thu nhỏ font một chút cho vừa chữ
                
                // Trả lại số sau 1 giây
                setTimeout(() => {
                    generateTOTP(); 
                }, 1000);
            }).catch(err => {
                alert("Không thể sao chép: " + err);
            });
        }

        // Hàm sao chép Secret Key
        function copySecret() {
            const secretInput = document.getElementById('secret');
            if (!secretInput.value) return;

            navigator.clipboard.writeText(secretInput.value).then(() => {
                // Hiệu ứng nháy màu nền input để báo hiệu đã copy
                const originalBg = secretInput.style.backgroundColor;
                secretInput.style.backgroundColor = "#d4edda"; // Xanh nhạt
                setTimeout(() => {
                    secretInput.style.backgroundColor = originalBg;
                }, 300);
            });
        }

        // Vòng lặp đếm ngược thời gian và cập nhật UI
        setInterval(() => {
            const epoch = Math.floor(new Date().getTime() / 1000.0);
            const remaining = 30 - (epoch % 30);
            
            document.getElementById('countdown').innerText = remaining;
            
            const progressFill = document.getElementById('progress');
            const progressWidth = (remaining / 30) * 100;
            progressFill.style.width = progressWidth + '%';

            if (remaining <= 5) {
                progressFill.classList.add('warning');
            } else {
                progressFill.classList.remove('warning');
            }

            if (remaining === 30) {
                generateTOTP();
            }
        }, 1000);

        generateTOTP();
    </script>
</body>
</html>
